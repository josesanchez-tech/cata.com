<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA STRIKE — Defensa Galáctica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh; font-family:'Orbitron',monospace;
    overflow:hidden; user-select:none;
  }
  #gameWrapper { position:relative; width:520px; }

  #hud {
    width:520px;
    background:linear-gradient(180deg,#000 0%,#05060f 100%);
    border:1px solid #1a2a4a; border-bottom:none;
    padding:7px 14px;
    display:flex; align-items:center; justify-content:space-between; gap:6px;
  }
  .hud-block { display:flex; flex-direction:column; align-items:center; }
  .hud-label { font-size:7px; color:#3a6aaa; letter-spacing:2px; text-transform:uppercase; font-family:'Share Tech Mono',monospace; }
  .hud-value { font-size:14px; font-weight:700; color:#7af; letter-spacing:1px; }

  #livesDisplay { display:flex; gap:2px; align-items:center; }
  .life-icon { width:9px; height:12px; background:#0af; clip-path:polygon(50% 0%,100% 100%,50% 75%,0% 100%); transition:opacity .3s; }
  .life-icon.dead { background:#222; opacity:.25; }

  #weaponNameTag { font-size:9px; font-weight:700; letter-spacing:2px; font-family:'Share Tech Mono',monospace; text-align:center; min-width:58px; }

  /* Kill progress bar */
  #killProgress {
    width:520px; height:7px; background:#040408;
    border-left:1px solid #1a2a4a; border-right:1px solid #1a2a4a;
    position:relative; overflow:hidden;
  }
  #killProgressFill { height:100%; width:0%; background:linear-gradient(90deg,#0af,#0ff); box-shadow:0 0 8px #0af; transition:width .15s; }
  #killProgressLabel { position:absolute; right:6px; top:0; font-size:7px; color:#0af8; font-family:'Share Tech Mono',monospace; line-height:7px; }

  canvas { display:block; border:1px solid #1a3060; box-shadow:0 0 40px #0038a088,0 0 4px #004488; }

  /* Weapon timer bar */
  #weaponTimerBar { width:520px; height:4px; background:#040408; border-left:1px solid #1a2a4a; border-right:1px solid #1a2a4a; }
  #weaponTimerFill { height:100%; width:0%; background:linear-gradient(90deg,#ff0,#f80); box-shadow:0 0 5px #ff0; }

  #bottomHud {
    width:520px; background:linear-gradient(0deg,#000 0%,#05060f 100%);
    border:1px solid #1a2a4a; border-top:none; padding:5px 14px;
    display:flex; align-items:center; justify-content:space-between;
  }
  #bossBarWrap { display:flex; flex-direction:column; gap:2px; }
  #bossBar { width:180px; height:7px; background:#111; border:1px solid #400; border-radius:2px; overflow:hidden; }
  #bossBarFill { height:100%; background:linear-gradient(90deg,#f00,#f80); transition:width .15s; }
  #bossLabel { font-size:8px; color:#f44; letter-spacing:2px; font-family:'Share Tech Mono',monospace; }
  #controls { font-size:8px; color:#2a4a6a; font-family:'Share Tech Mono',monospace; letter-spacing:1px; }

  /* Overlay */
  #overlay {
    position:absolute; top:0; left:0; width:520px; height:640px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,10,.93); z-index:10;
  }
  .overlay-title { font-size:38px; font-weight:900; color:#fff; letter-spacing:4px; text-shadow:0 0 30px #0af,0 0 60px #0048ff; margin-bottom:8px; text-align:center; }
  .overlay-sub { font-size:11px; color:#5af; letter-spacing:3px; margin-bottom:28px; font-family:'Share Tech Mono',monospace; }
  .big-btn {
    background:transparent; border:2px solid #0af; color:#0af;
    font-family:'Orbitron',monospace; font-size:13px; font-weight:700;
    letter-spacing:3px; padding:11px 32px; cursor:pointer; text-transform:uppercase;
    transition:all .2s; clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); margin:5px;
  }
  .big-btn:hover { background:#0af; color:#000; box-shadow:0 0 28px #0af; }
  .big-btn.red { border-color:#f44; color:#f44; }
  .big-btn.red:hover { background:#f44; color:#000; box-shadow:0 0 28px #f44; }

  /* World announce */
  .world-announce { position:absolute; top:0; left:0; width:520px; height:640px; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:5; }
  .world-announce-inner { text-align:center; animation:wFade 3.2s forwards; }
  @keyframes wFade { 0%{opacity:0;transform:scale(.8)} 18%{opacity:1;transform:scale(1.04)} 70%{opacity:1;transform:scale(1)} 100%{opacity:0} }

  /* Score pops */
  #scorePopups { position:absolute; top:50px; left:0; width:520px; height:540px; pointer-events:none; z-index:6; overflow:hidden; }
  .score-pop { position:absolute; font-family:'Share Tech Mono',monospace; font-size:13px; font-weight:bold; animation:floatUp .95s forwards; pointer-events:none; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-52px)} }

  /* Flash */
  .flash-overlay { position:absolute; top:0; left:0; width:520px; height:640px; pointer-events:none; z-index:7; animation:flashA .3s forwards; }
  @keyframes flashA { 0%{opacity:.65} 100%{opacity:0} }

  /* Weapon announce */
  .weapon-announce { position:absolute; top:0; left:0; width:520px; height:640px; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:8; }
  .weapon-announce-inner { text-align:center; padding:14px 28px; border:2px solid; border-radius:4px; animation:wepFade 2.2s forwards; }
  @keyframes wepFade { 0%{opacity:0;transform:scale(.8) translateY(-20px)} 15%{opacity:1;transform:scale(1.06) translateY(0)} 70%{opacity:1;transform:scale(1)} 100%{opacity:0} }
  .weapon-announce-title { font-size:10px; letter-spacing:3px; margin-bottom:4px; font-family:'Share Tech Mono',monospace; }
  .weapon-announce-name  { font-size:22px; font-weight:900; letter-spacing:4px; }
</style>
</head>
<body>
<div id="gameWrapper">

  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="scoreDisplay">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">Vidas</span>
      <div id="livesDisplay"></div>
    </div>
    <div class="hud-block">
      <span class="hud-label">Arma</span>
      <div id="weaponNameTag">—</div>
    </div>
    <div class="hud-block">
      <span class="hud-label">Mundo</span>
      <span class="hud-value" id="worldDisplay">1</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">Hi-Score</span>
      <span class="hud-value" id="hiScoreDisplay">0</span>
    </div>
  </div>

  <div id="killProgress">
    <div id="killProgressFill"></div>
    <div id="killProgressLabel">0/100</div>
  </div>

  <canvas id="gameCanvas" width="520" height="640"></canvas>

  <div id="weaponTimerBar"><div id="weaponTimerFill"></div></div>

  <div id="bottomHud">
    <div id="bossBarWrap" style="display:none">
      <div id="bossLabel">⚠ BOSS FINAL</div>
      <div id="bossBar"><div id="bossBarFill" style="width:100%"></div></div>
    </div>
    <div id="controls">FLECHAS/WASD · ESPACIO · P=PAUSA</div>
  </div>

  <div id="overlay">
    <div class="overlay-title">NOVA STRIKE</div>
    <div class="overlay-sub">— DEFENSA GALÁCTICA —</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#5af;text-align:center;margin-bottom:22px;line-height:2.2;max-width:360px;">
      10 MUNDOS · 10 VIDAS<br>
      ARMA NUEVA CADA 7 SEGUNDOS<br>
      100 NAVES DESTRUIDAS POR MUNDO
    </div>
    <button class="big-btn" onclick="startGame()">▶ INICIAR MISIÓN</button>
  </div>

  <div id="worldAnnounceContainer"></div>
  <div id="weaponAnnounceContainer"></div>
  <div id="scorePopups"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 520, H = 640;
const FPS = 60;
const KILLS_PER_WORLD   = 100;
const WEAPON_SEC        = 7;      // seconds between auto weapon upgrades

// ═══════════════════════════════════════
const WORLDS = [
  { name:"NEBULOSA CRIMSONIA",  desc:"Sector de polvo rojo",          bg:['#0a0008','#1a0010','#2a0020'], star:'#ff8888', accent:'#ff4466', eColor:'#ff6666', bColor:'#ff0033' },
  { name:"GLACIAR ETERNO",      desc:"Cinturón de hielo polar",        bg:['#00050a','#001020','#002040'], star:'#aaddff', accent:'#44aaff', eColor:'#88ccff', bColor:'#0088ff' },
  { name:"VOLCÁN MAGMÁTICO",    desc:"Zona de plasma ardiente",        bg:['#0a0500','#1a0800','#2a1000'], star:'#ffaa44', accent:'#ff6600', eColor:'#ff8833', bColor:'#ff4400' },
  { name:"VACÍO CUÁNTICO",      desc:"Dimensión fragmentada",          bg:['#050010','#0a0030','#100050'], star:'#cc88ff', accent:'#8844ff', eColor:'#aa66ff', bColor:'#6600ff' },
  { name:"TORMENTA ELECTRA",    desc:"Pulsar de alta energía",         bg:['#000a0a','#001515','#002020'], star:'#44ffcc', accent:'#00ffaa', eColor:'#00ddaa', bColor:'#00ffcc' },
  { name:"NEBULOSA DORADA",     desc:"Núcleo estelar aurum",           bg:['#080800','#151200','#202000'], star:'#ffee88', accent:'#ffcc00', eColor:'#ffdd44', bColor:'#ffaa00' },
  { name:"ABISMO OSCURO",       desc:"Singularidad colapsada",         bg:['#030303','#070707','#0c0c0c'], star:'#8888aa', accent:'#6666dd', eColor:'#5555cc', bColor:'#4444ff' },
  { name:"SELVA BIÓNICA",       desc:"Planeta de vida cibernética",    bg:['#000a02','#001505','#002008'], star:'#88ff88', accent:'#00ff44', eColor:'#44ff66', bColor:'#00ee33' },
  { name:"TIFÓN SOLAR",         desc:"Corona de estrella gigante",     bg:['#0a0400','#150800','#201000'], star:'#ffff88', accent:'#ffff00', eColor:'#ffee00', bColor:'#ffcc00' },
  { name:"COLAPSO FINAL",       desc:"El fin del universo conocido",   bg:['#050010','#0a0020','#10002a'], star:'#ff88ff', accent:'#ff00ff', eColor:'#ee44ee', bColor:'#ff00aa' },
];

const WEAPONS = [
  { name:"LASER I",  color:'#0af', count:1, speed:11, dmg:1, cool:16, spread:0  },
  { name:"LASER II", color:'#0ff', count:1, speed:13, dmg:2, cool:13, spread:0  },
  { name:"DUAL",     color:'#0f8', count:2, speed:13, dmg:2, cool:13, spread:9  },
  { name:"TRIPLE",   color:'#8f0', count:3, speed:13, dmg:2, cool:11, spread:10 },
  { name:"PLASMA",   color:'#ff0', count:3, speed:14, dmg:3, cool:10, spread:10 },
  { name:"SCATTER",  color:'#fa0', count:5, speed:13, dmg:2, cool:10, spread:9  },
  { name:"BURST",    color:'#f80', count:3, speed:15, dmg:4, cool:8,  spread:11 },
  { name:"MEGA",     color:'#f40', count:5, speed:15, dmg:4, cool:8,  spread:9  },
  { name:"NOVA",     color:'#f0f', count:7, speed:16, dmg:5, cool:6,  spread:8  },
  { name:"OMEGA",    color:'#fff', count:9, speed:18, dmg:6, cool:4,  spread:7  },
];

// ─── state ───
let state='menu', score=0, hiScore=0, lives=10;
let worldIdx=0, weaponLevel=0;
let paused=false, frame=0;
let killCount=0;
let bossActive=false, bossDefeated=false, worldTransitioning=false;
let weaponTimer=0, shootCooldown=0, spawnTimer=0;
let player={ x:260, y:560, w:28, h:34, invincible:0, thrustAnim:0, speed:4.5 };
let bullets=[], enemyBullets=[], enemies=[], boss=null, particles=[], stars=[], powerups=[];

// ─── stars ───
function initStars(){
  stars=[];
  for(let i=0;i<130;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+.2,speed:Math.random()*1.8+.4,op:Math.random()*.7+.3,tw:Math.random()*Math.PI*2});
}
function drawStars(){
  const w=WORLDS[worldIdx];
  for(const s of stars){
    s.y+=s.speed; s.tw+=.05;
    if(s.y>H){s.y=0;s.x=Math.random()*W;}
    const op=s.op*(.7+.3*Math.sin(s.tw));
    // parse star hex to rgb for rgba()
    const sr=parseInt(w.star.slice(1,3),16), sg2=parseInt(w.star.slice(3,5),16), sb=parseInt(w.star.slice(5,7),16);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${sr},${sg2},${sb},${op.toFixed(2)})`;
    ctx.fill();
  }
}
function drawBg(){
  const w=WORLDS[worldIdx];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,w.bg[0]); g.addColorStop(.5,w.bg[1]); g.addColorStop(1,w.bg[2]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=.04+.015*Math.sin(frame*.005);
  for(let i=0;i<3;i++){
    const gx=80+i*180+50*Math.sin(frame*.003+i);
    const gy=100+i*190+40*Math.cos(frame*.004+i);
    const gr=ctx.createRadialGradient(gx,gy,0,gx,gy,130);
    gr.addColorStop(0,w.accent); gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}

// ─── helper: expand 3-digit hex + append 2-char alpha ───
// ca('#f44', '33') → '#ff444433'  (valid 8-digit hex)
// ca('#ff4466', '33') → '#ff446633'
function ca(hex, alpha) {
  let h = hex.replace('#','');
  if(h.length===3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  return '#'+h+alpha;
}

// ─── player ───
function drawPlayer(){
  const{x,y,w,h,invincible,thrustAnim}=player;
  if(invincible>0&&Math.floor(invincible/4)%2===0) return;
  const wc=WORLDS[worldIdx].accent;
  ctx.save(); ctx.translate(x,y);
  const ts=14+6*Math.abs(Math.sin(thrustAnim));
  const tg=ctx.createRadialGradient(0,h/2+4,0,0,h/2+4,ts);
  tg.addColorStop(0,'rgba(255,255,255,0.47)'); tg.addColorStop(.4,'rgba(0,170,255,0.31)'); tg.addColorStop(1,'transparent');
  ctx.fillStyle=tg; ctx.fillRect(-ts,h/2-2,ts*2,ts*2);
  ctx.beginPath();
  ctx.moveTo(0,-h/2); ctx.lineTo(w/2,h/2); ctx.lineTo(w/4,h/3); ctx.lineTo(-w/4,h/3); ctx.lineTo(-w/2,h/2); ctx.closePath();
  const sg=ctx.createLinearGradient(0,-h/2,0,h/2);
  sg.addColorStop(0,'#fff'); sg.addColorStop(.4,wc); sg.addColorStop(1,'#003366');
  ctx.fillStyle=sg; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-h/6,w/6,h/7,0,0,Math.PI*2); ctx.fillStyle='#aaeeff'; ctx.fill();
  ctx.shadowBlur=14; ctx.shadowColor=wc; ctx.strokeStyle=wc; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-h/2); ctx.lineTo(w/2,h/2); ctx.lineTo(w/4,h/3); ctx.lineTo(-w/4,h/3); ctx.lineTo(-w/2,h/2); ctx.closePath(); ctx.stroke();
  ctx.restore();
}

// ─── enemy (always from top, moves downward) ───
function drawEnemy(e){
  const{x,y,w,h,type,hp,maxHp,color,flashTimer}=e;
  ctx.save(); ctx.translate(x,y); ctx.globalAlpha=.93;
  const col=flashTimer>0?'#fff':color;
  if(type===0){
    ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w/2,-h/2); ctx.lineTo(-w/2,-h/2); ctx.closePath();
    const g=ctx.createLinearGradient(0,h/2,0,-h/2);
    g.addColorStop(0,col); g.addColorStop(1,ca(col,'33'));
    ctx.fillStyle=g; ctx.fill(); ctx.strokeStyle=col; ctx.lineWidth=1.4; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.31)'; ctx.fill();
  } else if(type===1){
    ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w*.6,0); ctx.lineTo(0,-h/2); ctx.lineTo(-w*.6,0); ctx.closePath();
    const g=ctx.createRadialGradient(0,0,0,0,0,w/2);
    g.addColorStop(0,'rgba(255,255,255,0.19)'); g.addColorStop(.5,col); g.addColorStop(1,ca(col,'22'));
    ctx.fillStyle=g; ctx.fill(); ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w*.28,-h*.3); ctx.lineTo(0,-h/2); ctx.lineTo(-w*.28,-h*.3); ctx.closePath();
    ctx.fillStyle=flashTimer>0?'#fff':col; ctx.fill(); ctx.strokeStyle=ca(col,'aa'); ctx.lineWidth=1; ctx.stroke();
  }
  if(hp<maxHp){
    const bw=w*.8; ctx.fillStyle='#300'; ctx.fillRect(-bw/2,-h/2-6,bw,3);
    ctx.fillStyle='#f44'; ctx.fillRect(-bw/2,-h/2-6,bw*(hp/maxHp),3);
  }
  ctx.restore();
}

// ─── boss ───
function drawBoss(b){
  const{x,y,w,h,hp,maxHp,flashTimer,angle}=b;
  const world=WORLDS[worldIdx];
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  const col=flashTimer>0?'#fff':world.bColor;
  ctx.beginPath(); ctx.arc(0,0,w/2+4+3*Math.sin(frame*.06),0,Math.PI*2); ctx.strokeStyle=ca(col,'44'); ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/6,r=w/2; i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));}
  ctx.closePath();
  const bg=ctx.createRadialGradient(0,0,0,0,0,w/2);
  bg.addColorStop(0,ca(col,'cc')); bg.addColorStop(.6,ca(world.bColor,'77')); bg.addColorStop(1,ca(world.bColor,'11'));
  ctx.fillStyle=bg; ctx.fill(); ctx.shadowBlur=20; ctx.shadowColor=col; ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,w/5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  for(let i=0;i<3;i++){const a=(i/3)*Math.PI*2; ctx.beginPath(); ctx.arc((w/2-9)*Math.cos(a),(w/2-9)*Math.sin(a),7,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();}
  ctx.restore();
  document.getElementById('bossBarFill').style.width=(hp/maxHp*100)+'%';
}

function drawBullet(b){
  ctx.save(); ctx.shadowBlur=8; ctx.shadowColor=b.color; ctx.fillStyle=b.color;
  ctx.beginPath(); ctx.ellipse(b.x,b.y,b.big?5:2.5,b.big?11:8,0,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function drawEnemyBullet(b){
  ctx.save(); ctx.shadowBlur=6; ctx.shadowColor='#f55'; ctx.fillStyle='#f55';
  ctx.beginPath(); ctx.ellipse(b.x,b.y,3,7,0,0,Math.PI*2); ctx.fill(); ctx.restore();
}

// ─── particles ───
function spawnExp(x,y,color,n=18,sz=1){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:Math.random()*.04+.02,r:(Math.random()*3+1)*sz,color});
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;p.life-=p.decay;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}

// ─── powerup (life only) ───
function drawPowerup(p){
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(frame*.05);
  ctx.shadowBlur=12; ctx.shadowColor='#f0f'; ctx.strokeStyle='#f0f'; ctx.lineWidth=2; ctx.strokeRect(-10,-10,20,20);
  ctx.font='bold 13px monospace'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('♥',0,0);
  ctx.restore();
}

// ─── input ───
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyP'&&state==='playing') paused=!paused;
  if(e.code==='Enter'&&(state==='gameover'||state==='win')) startGame();
  e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.code]=false);

// ─── spawn enemy: enters from TOP, flies straight DOWN ───
function spawnEnemy(){
  const world=WORLDS[worldIdx];
  const roll=Math.random();
  const hc=.12+worldIdx*.04, sc=.18+worldIdx*.03;
  const type=roll<hc?1:roll<hc+sc?2:0;
  const diff=1+worldIdx*.22;
  enemies.push({
    x:Math.random()*(W-60)+30, y:-32,
    w:type===1?32:22, h:type===1?32:22,
    type,
    hp:Math.ceil([2,5,1][type]*diff),
    maxHp:Math.ceil([2,5,1][type]*diff),
    color:world.eColor,
    vx:0,
    vy:[1.3,1.0,2.5][type]*(1+worldIdx*.1),
    oscAmp:type===2?.3:1.1,
    oscPhase:Math.random()*Math.PI*2,
    shootTimer:Math.floor(Math.random()*60),
    shootRate:Math.max(38,105-worldIdx*7),
    flashTimer:0
  });
}

// ─── spawn boss ───
function spawnBoss(){
  const hp=50+worldIdx*35;
  boss={ x:W/2, y:-70, w:70+worldIdx*4, h:70+worldIdx*4, hp, maxHp:hp,
    vx:1.3+worldIdx*.15, vy:0, shootTimer:0,
    shootRate:Math.max(12,38-worldIdx*2), flashTimer:0, angle:0, phase:'enter' };
  bossActive=true;
  document.getElementById('bossBarWrap').style.display='flex';
}

// ─── shoot ───
function playerShoot(){
  const wp=WEAPONS[weaponLevel], n=wp.count, half=(n-1)/2;
  for(let i=0;i<n;i++){
    const ox=(i-half)*wp.spread;
    bullets.push({x:player.x+ox, y:player.y-player.h/2, vx:ox*.04, vy:-wp.speed, color:wp.color, dmg:wp.dmg, big:weaponLevel>=6});
  }
}

function rects(ax,ay,aw,ah,bx,by,bw,bh){ return Math.abs(ax-bx)<(aw+bw)/2&&Math.abs(ay-by)<(ah+bh)/2; }

// ─── score pop ───
function scorePop(x,y,text,color='#fff'){
  const div=document.getElementById('scorePopups');
  const p=document.createElement('div');
  p.className='score-pop'; p.style.left=x+'px'; p.style.top=(y-50)+'px'; p.style.color=color;
  p.textContent=text; div.appendChild(p); setTimeout(()=>p.remove(),1000);
}
function flashScreen(color){
  const el=document.createElement('div'); el.className='flash-overlay'; el.style.background=color;
  document.getElementById('gameWrapper').appendChild(el); setTimeout(()=>el.remove(),310);
}

// ─── weapon upgrade (auto every 7s) ───
function upgradeWeapon(){
  if(weaponLevel>=WEAPONS.length-1) return;
  weaponLevel++;
  const wp=WEAPONS[weaponLevel];
  flashScreen(ca(wp.color,'2a'));
  spawnExp(player.x,player.y,wp.color,28,1.2);
  const cont=document.getElementById('weaponAnnounceContainer');
  cont.innerHTML=`<div class="weapon-announce"><div class="weapon-announce-inner" style="border-color:${wp.color};background:${wp.color}14;box-shadow:0 0 30px ${wp.color}44"><div class="weapon-announce-title" style="color:${wp.color}">⬆ NUEVA ARMA — 7 SEG</div><div class="weapon-announce-name" style="color:${wp.color};text-shadow:0 0 15px ${wp.color}">${wp.name}</div></div></div>`;
  setTimeout(()=>cont.innerHTML='',2200);
}

// ─── HUD ───
function updateHUD(){
  document.getElementById('scoreDisplay').textContent=score.toLocaleString();
  document.getElementById('hiScoreDisplay').textContent=hiScore.toLocaleString();
  document.getElementById('worldDisplay').textContent=worldIdx+1;
  const ld=document.getElementById('livesDisplay'); ld.innerHTML='';
  for(let i=0;i<10;i++){const d=document.createElement('div');d.className='life-icon'+(i>=lives?' dead':'');ld.appendChild(d);}
  const wp=WEAPONS[weaponLevel];
  const wnt=document.getElementById('weaponNameTag'); wnt.textContent=wp.name; wnt.style.color=wp.color;
  const pct=Math.min(killCount,KILLS_PER_WORLD)/KILLS_PER_WORLD*100;
  document.getElementById('killProgressFill').style.width=pct+'%';
  document.getElementById('killProgressLabel').textContent=Math.min(killCount,KILLS_PER_WORLD)+'/'+KILLS_PER_WORLD;
  const tpct=Math.min(weaponTimer/(WEAPON_SEC*FPS)*100,100);
  document.getElementById('weaponTimerFill').style.width=tpct+'%';
}

// ─── world announce ───
function announceWorld(){
  const w=WORLDS[worldIdx];
  document.getElementById('worldAnnounceContainer').innerHTML=`<div class="world-announce"><div class="world-announce-inner"><div style="font-size:11px;letter-spacing:4px;color:${w.accent};font-family:'Share Tech Mono',monospace;margin-bottom:4px">MUNDO ${worldIdx+1}</div><div style="font-size:26px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 0 20px ${w.accent};margin-bottom:5px">${w.name}</div><div style="font-size:10px;color:${w.accent};letter-spacing:2px;font-family:'Share Tech Mono',monospace">${w.desc}</div><div style="margin-top:8px;font-size:8px;color:#555;font-family:'Share Tech Mono',monospace;letter-spacing:1px">OBJETIVO: DESTRUIR 100 NAVES</div></div></div>`;
  setTimeout(()=>document.getElementById('worldAnnounceContainer').innerHTML='',3300);
}

// ─── next world ───
function nextWorld(){
  worldIdx++;
  if(worldIdx>=WORLDS.length){ state='win'; showOverlay('win'); return; }
  worldTransitioning=true;
  enemies=[]; enemyBullets=[]; bullets=[]; powerups=[];
  boss=null; bossActive=false; bossDefeated=false; killCount=0;
  document.getElementById('bossBarWrap').style.display='none';
  weaponTimer=0;
  announceWorld();
  setTimeout(()=>worldTransitioning=false,3400);
}

// ─── overlay ───
function showOverlay(type){
  const ov=document.getElementById('overlay'); ov.style.display='flex';
  if(type==='gameover') ov.innerHTML=`<div class="overlay-title" style="color:#f44;text-shadow:0 0 30px #f44">GAME OVER</div><div class="overlay-sub">MISIÓN FALLIDA</div><div style="font-size:11px;color:#777;margin-bottom:6px;font-family:'Share Tech Mono',monospace">PUNTUACIÓN FINAL</div><div style="font-size:34px;color:#f88;font-weight:900;margin-bottom:20px">${score.toLocaleString()}</div><button class="big-btn red" onclick="startGame()">↻ REINTENTAR</button>`;
  else if(type==='win') ov.innerHTML=`<div class="overlay-title" style="color:#ff0;text-shadow:0 0 30px #ff0">¡VICTORIA!</div><div class="overlay-sub" style="color:#ff0">GALAXIA LIBERADA</div><div style="font-size:10px;color:#888;margin-bottom:6px;font-family:'Share Tech Mono',monospace">PUNTUACIÓN FINAL</div><div style="font-size:36px;color:#ff0;font-weight:900;margin-bottom:4px">${score.toLocaleString()}</div><div style="font-size:9px;color:#666;margin-bottom:22px;font-family:'Share Tech Mono',monospace">HI-SCORE: ${hiScore.toLocaleString()}</div><button class="big-btn" onclick="startGame()">↻ NUEVA PARTIDA</button>`;
}

// ─── start ───
function startGame(){
  score=0;lives=10;worldIdx=0;weaponLevel=0;
  enemies=[];bullets=[];enemyBullets=[];particles=[];powerups=[];
  boss=null;bossActive=false;bossDefeated=false;killCount=0;
  player.x=W/2;player.y=560;player.invincible=0;
  frame=0;spawnTimer=0;weaponTimer=0;shootCooldown=0;
  worldTransitioning=false;paused=false;
  document.getElementById('bossBarWrap').style.display='none';
  document.getElementById('overlay').style.display='none';
  document.getElementById('weaponAnnounceContainer').innerHTML='';
  initStars(); announceWorld();
  setTimeout(()=>state='playing',200);
}

// ─── player hit ───
function playerHit(){
  lives--; player.invincible=130;
  spawnExp(player.x,player.y,'#0af',28,1.5); flashScreen('rgba(255,0,0,0.25)');
  if(lives<=0){ state='gameover'; spawnExp(player.x,player.y,'#fff',55,2); setTimeout(()=>showOverlay('gameover'),900); }
}

// ══════════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════════
function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(state!=='playing'){ drawBg(); drawStars(); return; }
  if(paused){
    drawBg(); drawStars();
    ctx.fillStyle='rgba(0,0,20,.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#7af'; ctx.font='bold 28px Orbitron'; ctx.textAlign='center'; ctx.fillText('— PAUSA —',W/2,H/2);
    ctx.font='11px Share Tech Mono'; ctx.fillStyle='#456'; ctx.fillText('P para continuar',W/2,H/2+30); ctx.textAlign='left';
    return;
  }

  frame++;
  ctx.clearRect(0,0,W,H);
  drawBg(); drawStars();

  // ── AUTO WEAPON UPGRADE EVERY 7 SECONDS ──
  if(weaponLevel<WEAPONS.length-1){
    weaponTimer++;
    if(weaponTimer>=WEAPON_SEC*FPS){ weaponTimer=0; upgradeWeapon(); }
  }

  // ── PLAYER MOVEMENT ──
  if(keys['ArrowLeft']||keys['KeyA'])  player.x-=player.speed;
  if(keys['ArrowRight']||keys['KeyD']) player.x+=player.speed;
  if(keys['ArrowUp']||keys['KeyW'])    player.y-=player.speed*.8;
  if(keys['ArrowDown']||keys['KeyS'])  player.y+=player.speed*.8;
  player.x=Math.max(20,Math.min(W-20,player.x));
  player.y=Math.max(40,Math.min(H-30,player.y));
  player.thrustAnim+=.25;
  if(player.invincible>0) player.invincible--;

  // ── SHOOT ──
  if(shootCooldown>0) shootCooldown--;
  if((keys['Space']||keys['KeyZ'])&&shootCooldown<=0){ playerShoot(); shootCooldown=WEAPONS[weaponLevel].cool; }

  // ── SPAWN ENEMIES ──
  if(!bossActive&&!worldTransitioning){
    spawnTimer++;
    const rate=Math.max(20,50-worldIdx*3);
    if(spawnTimer>=rate){ spawnEnemy(); spawnTimer=0; }
    if(!bossDefeated&&killCount>=KILLS_PER_WORLD){ spawnBoss(); enemies=[]; }
  }

  // ── PLAYER BULLETS ──
  bullets=bullets.filter(b=>b.y>-20);
  for(const b of bullets){ b.x+=b.vx; b.y+=b.vy; drawBullet(b); }

  // ── ENEMY BULLETS ──
  enemyBullets=enemyBullets.filter(b=>b.y<H+10);
  for(const b of enemyBullets){ b.x+=b.vx; b.y+=b.vy; drawEnemyBullet(b); }

  // ── ENEMIES — move from top, straight down ──
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    // Gentle oscillation left-right but always descending from top
    e.x+=Math.sin(frame*.04+e.oscPhase)*e.oscAmp;
    e.y+=e.vy;
    if(e.flashTimer>0) e.flashTimer--;
    if(e.y>H+35){ enemies.splice(i,1); continue; }

    // Enemy shoots straight down (slightly aimed at player x)
    e.shootTimer++;
    if(e.shootTimer>=e.shootRate){
      e.shootTimer=0;
      const dx=player.x-e.x;
      const dist=Math.max(1,Math.abs(dx));
      // aim horizontally but cap it — bullet travels mostly downward
      const hv=Math.sign(dx)*Math.min(1.8, Math.abs(dx)*0.025);
      enemyBullets.push({ x:e.x, y:e.y+e.h/2+2, vx:hv, vy:4 });
    }

    // Check bullet hits
    let killed=false;
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(rects(b.x,b.y,5,10,e.x,e.y,e.w,e.h)){
        e.hp-=b.dmg; e.flashTimer=6; bullets.splice(j,1);
        spawnExp(b.x,b.y,WEAPONS[weaponLevel].color,5,.6);
        if(e.hp<=0){
          spawnExp(e.x,e.y,e.color,22,1.2);
          const pts=(e.type+1)*50*(worldIdx+1);
          score+=pts; if(score>hiScore) hiScore=score;
          scorePop(e.x,e.y-30,'+'+pts,e.color);
          killCount++;
          if(Math.random()<.07) powerups.push({x:e.x,y:e.y,vy:1.8});
          enemies.splice(i,1); killed=true; break;
        }
      }
    }
    if(killed) continue;

    // Collision with player
    if(rects(player.x,player.y,player.w*.7,player.h*.7,e.x,e.y,e.w*.7,e.h*.7)){
      if(player.invincible<=0){ spawnExp(e.x,e.y,e.color,18); enemies.splice(i,1); playerHit(); continue; }
    }
    drawEnemy(e);
  }

  // ── BOSS ──
  if(bossActive&&boss){
    boss.angle+=.012; boss.flashTimer=Math.max(0,boss.flashTimer-1);
    if(boss.phase==='enter'){ boss.y+=2.2; if(boss.y>=110) boss.phase='fight'; }
    else { boss.x+=boss.vx; boss.y+=Math.sin(frame*.015)*.9; if(boss.x<55||boss.x>W-55) boss.vx*=-1; }
    boss.shootTimer++;
    if(boss.shootTimer>=boss.shootRate){
      boss.shootTimer=0;
      const shots=worldIdx>5?5:3;
      for(let i=0;i<shots;i++){
        const a=(Math.PI/2)+(i-(shots-1)/2)*.28;
        enemyBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(a)*4,vy:Math.sin(a)*4});
      }
    }
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(rects(b.x,b.y,5,10,boss.x,boss.y,boss.w*.85,boss.h*.85)){
        boss.hp-=b.dmg; boss.flashTimer=5; bullets.splice(j,1);
        spawnExp(b.x,b.y,WEAPONS[weaponLevel].color,5,.5);
        if(boss.hp<=0){
          spawnExp(boss.x,boss.y,WORLDS[worldIdx].bColor,65,2.5);
          flashScreen(ca(WORLDS[worldIdx].bColor,'66'));
          const bpts=8000*(worldIdx+1); score+=bpts; if(score>hiScore) hiScore=score;
          scorePop(W/2,H/2-40,'✦ BOSS +'+bpts.toLocaleString(),WORLDS[worldIdx].bColor);
          powerups.push({x:boss.x,y:boss.y,vy:2});
          boss=null; bossActive=false; bossDefeated=true;
          document.getElementById('bossBarWrap').style.display='none';
          setTimeout(()=>nextWorld(),2800); break;
        }
      }
    }
    if(boss){
      if(rects(player.x,player.y,player.w*.6,player.h*.6,boss.x,boss.y,boss.w*.5,boss.h*.5)) if(player.invincible<=0) playerHit();
      drawBoss(boss);
    }
  }

  // ── ENEMY BULLETS → PLAYER ──
  for(let i=enemyBullets.length-1;i>=0;i--){
    const b=enemyBullets[i];
    if(rects(b.x,b.y,6,10,player.x,player.y,player.w*.6,player.h*.6)){
      if(player.invincible<=0){ spawnExp(b.x,b.y,'#f55',8,.8); enemyBullets.splice(i,1); playerHit(); }
    }
  }

  // ── POWERUPS ──
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i]; p.y+=p.vy;
    if(p.y>H+20){ powerups.splice(i,1); continue; }
    if(rects(p.x,p.y,20,20,player.x,player.y,player.w,player.h)){
      if(lives<10){ lives++; scorePop(p.x,p.y-20,'♥ VIDA!','#f0f'); spawnExp(p.x,p.y,'#f0f',14,1); }
      powerups.splice(i,1); continue;
    }
    drawPowerup(p);
  }

  // ── PARTICLES ──
  updateParticles();

  // ── PLAYER ──
  drawPlayer();

  // ── ON-CANVAS COUNTERS ──
  if(!bossActive){
    ctx.save();
    ctx.font='bold 10px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillStyle='rgba(0,170,255,0.27)'; ctx.fillText('NAVES: '+Math.min(killCount,KILLS_PER_WORLD)+' / '+KILLS_PER_WORLD,W/2,H-10);
    ctx.restore();
  }
  if(bossActive&&boss){
    ctx.save(); ctx.font='bold 9px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillStyle='#f44'; ctx.fillText('⚠  DERROTA AL BOSS PARA AVANZAR  ⚠',W/2,H-10); ctx.restore();
  }

  updateHUD();
}

initStars();
gameLoop();
</script>
